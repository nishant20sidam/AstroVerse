<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earth - Astroverse</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: url("Earth.webp") no-repeat center center fixed;
            background-size: cover;
            color: white;
            text-align: center;
            padding: 20px;
        }
        .info-box {
            max-width: 700px;
            margin: auto;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 10px;
        }
        h1 {
            color: cyan;
        }
        p {
            font-size: 18px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="info-box">
        <h1>Earth</h1>
        <p>Earth is the third planet from the Sun and the only known planet to support life.</p>
        <p>It has a diverse environment, a protective atmosphere, and vast oceans covering 71% of its surface.</p>
    </div>
</body>
</html>
