<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neptune - Astroverse</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: url("neptune.jpg") no-repeat center center fixed;
            background-size: cover;
            color: white;
            text-align: center;
            padding: 20px;
        }
        .info-box {
            max-width: 700px;
            margin: auto;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 10px;
        }
        h1 {
            color: blue;
        }
        p {
            font-size: 18px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="info-box">
        <h1>Neptune</h1>
        <p>Neptune is the eighth and farthest planet from the Sun. It has powerful winds that reach up to 2,100 km/h, the fastest in the solar system.</p>
        <p>It is a deep blue ice giant with a thick atmosphere of hydrogen, helium, and methane.</p>
    </div>
</body>
</html>
