<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saturn - Astroverse</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: url("saturn.jpg") no-repeat center center fixed;
            background-size: cover;

        }

            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="info-box">
        <h1>Saturn</h1>
        <p>Saturn is the second-largest planet in our solar system and is best known for its stunning rings made of ice and rock.</p>

    </div>
