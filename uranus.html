<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uranus - Astroverse</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: url("uranus.jpg") no-repeat center center fixed;
            background-size: cover;
            color: white;
            text-align: center;
            padding: 20px;
        }
        .info-box {
            max-width: 700px;
            margin: auto;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 10px;
        }
        h1 {
            color: cyan;
        }
        p {
            font-size: 18px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="info-box">
        <h1>Uranus</h1>
        <p>Uranus is the seventh planet from the Sun and is unique because it rotates on its side.</p>
        <p>It is often called an "ice giant" due to its cold, methane-rich atmosphere that gives it a blue-green color.</p>
    </div>
</body>
</html>
