<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venus - Astroverse</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: url("venus.webp") no-repeat center center fixed;
            background-size: cover;
            color: white;
            text-align: center;
            padding: 20px;
        }
        .info-box {
            max-width: 700px;
            margin: auto;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 10px;
        }
        h1 {
            color: cyan;
        }
        p {
            font-size: 18px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="info-box">
        <h1>Venus</h1>
        <p>Venus is the second planet from the Sun and is the hottest in the solar system due to its thick, toxic atmosphere that traps heat.</p>
        <p>Its surface is covered with volcanoes, mountains, and vast plains, and the atmospheric pressure is 92 times that of Earth.</p>
    </div>
</body>
</html>
